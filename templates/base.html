<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobacco Crop Smart Pest Detection & Management</title>
    
    <!-- Google Fonts (Outfit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ChartJS for Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background Decor Elements -->
    <div class="bg-blur-circle circle-1"></div>
    <div class="bg-blur-circle circle-2"></div>
    <div class="bg-blur-circle circle-3"></div>

    <header class="navbar-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fa-solid fa-leaf logo-icon"></i>
                <span class="logo-text">Tobacco<span class="logo-accent">Guard</span></span>
            </a>
            
            <nav class="nav-menu">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i class="fa-solid fa-qrcode"></i> Diagnosis
                </a>
                <a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}">
                    <i class="fa-solid fa-history"></i> Log History
                </a>
                <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
            </nav>
            
            <div class="nav-status">
                <span class="status-indicator"></span>
                <span class="status-text">AI Engine Online</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2026 TobaccoGuard AI Systems. Advanced Pest Management Platform.</p>
            <div class="footer-links">
                <a href="#" class="footer-link">Documentation</a>
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="#" class="footer-link">GitHub</a>
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
